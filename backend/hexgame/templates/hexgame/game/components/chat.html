<style>

.chat {
  height: 100%;
  display: flex;
  flex-direction: column-reverse;
}

.chat-messages {
  overflow-y: auto;
}

.chat-messages .message:first-child {
  border-top: none !important;
}

.message {
  border-top: var(--border);
  padding: var(--font-size-xxsmall);
  h2 {
    font-size: var(--font-size-small);
  }

  i, p {
    font-size: var(--font-size-xsmall);
  }
}

.chat-input-section {
  border-top: var(--border);
  display: flex;
  flex-direction: column;
  padding: var(--font-size-xxsmall);
  gap: var(--font-size-xxsmall);

  textarea {
    resize: vertical;
  }
}
</style>

<div class="chat">
    <form class="chat-input-section" id="messageForm">
      <textarea name="message" placeholder="message" id="message-textarea"></textarea>
      <button type="submit">Send</button>
    </form>
  <div class="chat-messages" id="chat-messages"></div>
</div>

<script defer>
  const messagesDiv = document.getElementById("chat-messages");
  const sendMessageUrl = '{% url "post_chat_message" %}';
  const getMessagesUrl = '{% url "get_chat_messages" game_id=game.id %}';

  var messageCount = 0;

  function updateChatList(messages) {
    messagesDiv.innerHTML = "";

    for (var message of messages) {
      let newMessage = document.createElement("div");
      newMessage.className = "message";

      let usernameBlock = document.createElement("h2");
      usernameBlock.innerHTML = message.player.user.username;
      newMessage.appendChild(usernameBlock);

      let timestampBlock = document.createElement("i");
      let date = new Date(message.timestamp);
      timestampBlock.innerHTML = date.toLocaleString();
      newMessage.appendChild(timestampBlock);

      let messageBlock = document.createElement("p");
      messageBlock.innerHTML = message.message;
      newMessage.appendChild(messageBlock);

      messagesDiv.appendChild(newMessage);
    }
   
    // new message received/posted
    if (messages.length != messageCount) {
      messageCount = messages.length;
      messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }
  }

  function postChatMessage(message) {

    const formData = new URLSearchParams();
    formData.append("game_id", "{{ game.id }}");
    formData.append("message", message);

    fetch(sendMessageUrl, {
      method: "POST",
      headers: { 
        "Content-Type": "application/x-www-form-urlencoded",
        "X-CSRFToken": getCSRFToken()
      },
      credentials: "include",
      body: formData.toString(),
    }).then(resp => resp.json().then(data => {
      updateChatList(data.messages);
    }))
  }

  function getChatMessages() {
    const formData = new URLSearchParams();
    formData.append("game_id", "{{ game.id }}");

    fetch(getMessagesUrl, {
      method: "GET",
    }).then(resp => resp.json().then(data => {
      updateChatList(data.messages)
    }))
  }

  const messageForm = document.getElementById("messageForm");
  messageForm.addEventListener("submit", (e) => {
    e.preventDefault();

    let fd = new FormData(messageForm);
    let message = fd.get("message");
    postChatMessage(message); 
    let messageTextArea = document.getElementById("message-textarea");
    messageTextArea.value = "";
  })

  getChatMessages();
  setInterval(() => {
    getChatMessages();
  }, 5000);
</script>
