{% extends 'hexgame/base.html' %}
{% block title %}Game{% endblock title %}

{% block content %}
    <style>

      iframe {
        width: calc(100vw - 30px);
        height: calc(100vh - 200px);
      }

    </style>

    <a href="/">Home</a>
    <p>Players: [{% for player in game.players %}{{player.user.username}}, {% endfor %}]</p>

    <iframe src="/game/iframe/?game_id={{game.id}}" id="gameIframe" />

    <!-- Create Game -->
    <p>
        <a href="{% url 'home' %}">
            <button>Back Home</button>
        </a>
    </p>
{% endblock content %}
