{% extends 'hexgame/base.html' %}
  {% block title %}Game {{game.id}}{% endblock title %}

{% block content %}
  <style>

    .game-container {
      width: 100%;
      display: flex;
      gap: 30px;
      height: 100%;
    }

    .game-iframe-container {
      width: 100%;
      border: solid rgba(255, 255, 255, 0.5) 2px;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
    }

    .chat-container {
      width: max(280px, 25vw);
    }

    .game-info {
      margin-bottom: 2vw;

      i {
        display: block;
      }
    }

    @media screen and (max-width: 1200px) {
      .game-container {
        flex-direction: column;
        height: 100%;
      }

      .game-iframe-container {
        height: calc(65% - 30px);
      }

      .chat-container {
        width: 100%;
        height: 35%;
      }
    }
  </style>
  <!-- <div class="game-info"> -->
  <!--   <i>Players: [{% for player in game.players %}{{player.user.username}}, {% endfor %}]</i> -->
  <!--   {% if game.complete %}<i>Winner: {{game.winner.username}}</i>{% endif %} -->
  <!-- </div> -->

  <div class="game-container">
    <div class="game-iframe-container">
      <iframe src="/game/iframe/?game_id={{game.id}}{% if editor_mode %}&editorMode=1{% endif %}" id="gameIframe"></iframe>
    </div>

    <div class="chat-container">
      {% include "hexgame/game/components/chat.html" with game=game %}
    </div>
  </div>
{% endblock content %}
