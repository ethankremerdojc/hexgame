{% extends 'hexgame/base.html' %}
{% block title %}Game{% endblock title %}

{% block content %}
    <style>

      iframe {
        width: 100%;

        height: 84vh;
        display: block;
      }
      
      .content-inner {
        padding: 0 !important;
        position: relative;
        top: 2vw;
        left: 2vw;
        width: 96vw;
      }

      .game-info {
        margin-bottom: 2vw;

        i {
          display: block;
        }
      }

    </style>
    
    <div class="game-info">
      <a href="/" style="display: block;"><button>Home</button></a>
      <i>Players: [{% for player in game.players %}{{player.user.username}}, {% endfor %}]</i>
    </div>

    <iframe src="/game/iframe/?game_id={{game.id}}{% if editor_mode %}&editorMode=1{% endif %}" id="gameIframe" />
{% endblock content %}
