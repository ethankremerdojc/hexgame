{% extends 'hexgame/base.html' %}
{% block title %}Login{% endblock title %}

{% block content %}
    <h1>Login</h1>

    {% if form.errors %}
        <p>Your username and password didn't match. Please try again.</p>
    {% endif %}

    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Log in</button>
    </form>

    <p><a href="{% url 'register' %}">Create an account</a></p>

{% endblock content %}
